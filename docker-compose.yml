version: '3.9'

# 使用前：复制 .env.example 为 .env 并填入实际密码
# 启动：docker compose up -d
# 停止：docker compose down

services:
  # ── MySQL 8.0 ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cheese-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-cheese123}
      MYSQL_DATABASE: ${DB_NAME:-cheese}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-cheese123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Spring Boot 后端 ────────────────────────────────────────
  backend:
    build:
      context: ./cheese-springboot
      dockerfile: Dockerfile
    container_name: cheese-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-cheese}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-cheese123}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Nginx 前端 ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cheese-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./cheese-vue3/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
